<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travelgram</title>
  <link rel="stylesheet" href="./assets/css/index.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <section id="nav" class="flex">
        <img src="./assets/icons/Logo.svg" alt="Travelgram">

        <div class="items">
          <img src="./assets/icons/MagnifyingGlass.svg" alt="Lupa">
          <a class="nav-links desktop-only" href="#explore">Explorar</a>
          <a class="nav-links desktop-only" href="#my-trips">Minhas viagens</a>
          <img class="profile-nav" src="./assets/images/profile.png" alt="Foto de perfil">
        </div>
      </section>

      <section id="about">
        <div class="profile">
          <div class="content">
            <img src="./assets/images/profile.png" alt="Foto de perfil">
            <div class="bio">
              <h1>Isabela Torres</h1>
              <p>
                Amante de viagens, cultura e gastronomia. 🌍✈️ <br>
                Aqui compartilho as histórias registradas em cada clique, explorando cantinhos fascinantes do nosso planeta a partir da movimentada cidade de São Paulo. 🏙️📸
              </p>
            </div>
          </div>

          <div class="info grid">
            <ul>
              <li>
                <img src="./assets/icons/MapPin.svg" alt="Mapa">
                <span>São Paulo, Brazil</span>
              </li>
              <li>
                <img src="./assets/icons/AirplaneTilt.svg" alt="Avião">
                <span>37 países</span>
              </li>
              <li>
                <img src="./assets/icons/Image.svg" alt="Imagem">
                <span>240 fotos</span>
              </li>
            </ul>
          </div>
        </div>
      </section>
    </header>
  </div>
  
</body>
</html>
